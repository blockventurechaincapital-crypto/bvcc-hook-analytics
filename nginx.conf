# BVCC Hook Analytics — Nginx reverse proxy config
# Place in /etc/nginx/sites-available/bvcc-analytics
# Enable with: sudo ln -s /etc/nginx/sites-available/bvcc-analytics /etc/nginx/sites-enabled/
# Test with:   sudo nginx -t
# Reload with: sudo nginx -s reload

server {
    listen 80;
    server_name analytics.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name analytics.yourdomain.com;

    # SSL — obtain with: sudo certbot --nginx -d analytics.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/analytics.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.yourdomain.com/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Gzip
    gzip on;
    gzip_types text/html application/json text/css application/javascript;
    gzip_min_length 1024;

    # Main proxy to Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # data.json — bypass any nginx proxy cache, enforce no-store
    location = /data.json {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_bypass 1;
        add_header         Cache-Control "no-store" always;
    }

    # Static assets — long-lived browser cache (images, icons)
    location /assets/ {
        proxy_pass       http://127.0.0.1:3000;
        proxy_http_version 1.1;
        expires          30d;
        add_header       Cache-Control "public, max-age=2592000, immutable";
    }
}
